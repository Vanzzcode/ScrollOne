<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollOne · Masuk</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo">🏠</div>
                <h1 class="logo-text">ScrollOne</h1>
                <p class="logo-sub">Pulang ke Rumah, Bertemu Cerita</p>
            </div>

            <div id="messageContainer" class="message"></div>

            <!-- Google Login -->
            <button id="googleLoginBtn" class="btn-google">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                <span>Lanjutkan dengan Google</span>
            </button>

            <div class="divider"><span>atau</span></div>

            <!-- Form Manual -->
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="nama@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" id="manualLoginBtn" class="btn-email">
                    Masuk dengan Email
                </button>
            </form>

            <p style="text-align: center; margin-top: 24px; font-size: 14px; color: #78716c;">
                Belum punya akun? 
                <a href="#" id="showRegister" class="text-link">Daftar</a>
            </p>
        </div>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Data aman, email diverifikasi Google
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div style="background: white; max-width: 400px; margin: 20px; padding: 32px; border-radius: 24px;">
            <h2 style="margin-top: 0;">Daftar Akun Baru</h2>
            
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Ahmad Santoso">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="nama@email.com">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Minimal 6 karakter">
            </div>
            
            <button id="registerBtn" class="btn-email" style="margin-bottom: 12px;">Daftar</button>
            <button id="closeRegister" class="btn-google" style="border: 1px solid #d6d3d1;">Batal</button>
        </div>
    </div>

    <!-- Load Supabase Config DULU, baru Login JS -->
    <script src="js/supabase-config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
